packages:
  - "shared"
  - "server"
  - "web"
  - "mobile"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  prisma: true
  protobufjs: true
  unrs-resolver: true

# CVE-2026-54285: Force @opentelemetry/core to 2.8.0+ to mitigate unbounded memory in W3C baggage
# CVE-2026-48779: Force ws to latest patch
# CVE-2026-53655: Force tar to latest patch  
# CVE-2026-53550: Force js-yaml to 4.2.0+
# CVE-2026-48038: Force joi to patched versions
overrides:
  "@opentelemetry/core": ">=2.8.0"
  "@grpc/grpc-js": ">=1.14.4"
  "protobufjs": ">=7.6.3"
  "ws": ">=8.21.0"
  "tar": ">=7.5.16"
  "js-yaml": ">=4.2.0"
  "joi": ">=17.13.4"
  "@babel/core": ">=7.29.6"
  "esbuild": ">=0.28.1"
