packages:
  - "shared"
  - "server"
  - "web"
  - "mobile"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  prisma: true
  protobufjs: true
  unrs-resolver: true

# Security overrides live in root package.json under pnpm.overrides (pnpm-workspace.yaml does not support this field)
