name: Build and deploy Node.js app to Azure Web App - crabwatch-api

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@crabwatch/shared build

      - name: Build server
        run: pnpm --filter=server exec tsc

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r server/dist deploy/
          mkdir -p deploy/dist/server/src/locales
          cp server/src/locales/*.json deploy/dist/server/src/locales/
          cp server/package.json deploy/
          cp -r server/prisma deploy/
          cd deploy
          npm install --omit=dev --no-audit --no-fund --no-package-lock
          npx prisma generate
          # Bundle @crabwatch/shared (workspace package — npm install doesn't know about it)
          mkdir -p node_modules/@crabwatch
          cp -r ../shared/dist node_modules/@crabwatch/shared-dist
          cp ../shared/package.json node_modules/@crabwatch/shared-dist/
          mv node_modules/@crabwatch/shared-dist node_modules/@crabwatch/shared
          # Rename to bundled_modules so Oryx doesn't detect/destroy it
          mv node_modules bundled_modules
          # Include startup wrapper to bypass Oryx node_modules handling
          cp ../scripts/startup-wrapper.sh start.sh
          chmod +x start.sh
          zip -r ../crabwatch-api.zip .

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: crabwatch-api
          path: crabwatch-api.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: crabwatch-api
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F3D241DF77A465FB5F0CE0AF07E6D7A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BD96C2FE20AC428CBCCD3958E49880A4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_851B4F74A1304A729757464F26A6E974 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'crabwatch-api'
          slot-name: 'Production'
          package: crabwatch-api.zip

      - name: Configure startup and clear Oryx cache
        run: |
          # Set custom startup file so Oryx calls our wrapper instead of mangling node_modules
          az webapp config set \
            --resource-group VSES-CrabWatch-MY-RG \
            --name crabwatch-api \
            --startup-file "bash /home/site/wwwroot/start.sh"
          # Ensure build flags are set
          az webapp config appsettings set \
            --resource-group VSES-CrabWatch-MY-RG \
            --name crabwatch-api \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_NODE_DEFAULT_VERSION=22
          # Clear stale Oryx cache and install-done marker via Kudu API
          CREDS=$(az webapp deployment list-publishing-credentials \
            --resource-group VSES-CrabWatch-MY-RG \
            --name crabwatch-api \
            --query "{username: publishingUserName, password: publishingPassword}" \
            -o tsv)
          IFS=$'\t' read -r USER PASS <<< "$CREDS"
          AUTH=$(echo -n "$USER:$PASS" | base64 -w0)
          curl -s -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d '{"command": "rm -f /home/site/node_modules.tar.gz /home/site/oryx-manifest.toml /home/site/install-done /home/site/wwwroot/node_modules.tar.gz && echo cleared"}' \
            https://crabwatch-api.scm.azurewebsites.net/api/command || true

      - name: Restart Web App
        run: az webapp restart --resource-group VSES-CrabWatch-MY-RG --name crabwatch-api
