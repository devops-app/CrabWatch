# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - crabwatch-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@crabwatch/shared build

      - name: Build server
        run: pnpm --filter=server exec tsc

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r server/dist deploy/
          cp server/package.json deploy/
          cp -r server/prisma deploy/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: crabwatch-api
          path: deploy/
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: crabwatch-api
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5F3D241DF77A465FB5F0CE0AF07E6D7A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_BD96C2FE20AC428CBCCD3958E49880A4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_851B4F74A1304A729757464F26A6E974 }}

      - name: Verify downloaded artifact
        run: ls -la crabwatch-api/ && ls -la crabwatch-api.tar.gz 2>/dev/null || true

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'crabwatch-api'
          slot-name: 'Production'
          package: crabwatch-api

      - name: Restart Web App
        run: az webapp restart --resource-group VSES-CrabWatch-MY-RG --name crabwatch-api

      - name: Wait for health check
        run: |
          for i in {1..12}; do
            if curl -sf https://crabwatch-api.azurewebsites.net/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Waiting for health check... attempt $i"
            sleep 10
          done
          echo "Health check timed out"
          exit 1
