# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - crabwatch-web

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter=@crabwatch/shared build

      - name: Build web app
        run: pnpm --filter=@crabwatch/web build
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      - name: Prepare standalone deployment
        run: |
          cp -r web/.next/static web/.next/standalone/web/.next/static
          (cd web/.next/standalone && zip -r ../../../crabwatch-web.zip .)

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: crabwatch-web
          path: crabwatch-web.zip
          retention-days: 1

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: crabwatch-web
          path: .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6EEDB18321F5420A895791EB71E61A89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FDC2254746143CD8DA38D5D4876F309 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CFFB632CA86743B5B96216EA7A84DEE6 }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'crabwatch-web'
          slot-name: 'Production'
          package: crabwatch-web.zip

      - name: Set startup command
        run: az webapp config set --resource-group VSES-CrabWatch-MY-RG --name crabwatch-web --startup-file "node server.js"

      - name: Disable Oryx build
        run: az webapp config appsettings set --resource-group VSES-CrabWatch-MY-RG --name crabwatch-web --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false WEBSITE_NODE_DEFAULT_VERSION=22

      - name: Install production dependencies on server
        run: |
          PUBCRED=$(az webapp deployment list-publishing-credentials --resource-group VSES-CrabWatch-MY-RG --name crabwatch-web --query "{username:publishingUserName,password:password}" --output tsv)
          USERNAME=$(echo $PUBCRED | cut -f1)
          PASSWORD=$(echo $PUBCRED | cut -f2)
          curl -X POST "https://crabwatch-web.scm.azurewebsites.net/api/shell" \
            -u "$USERNAME:$PASSWORD" \
            -H "Content-Type: application/json" \
            -d '{"command":"cd /home/site/wwwroot && npm install --omit=dev"}'

      - name: Restart Web App
        run: az webapp restart --resource-group VSES-CrabWatch-MY-RG --name crabwatch-web
