name: Build and deploy Node.js app to Azure Web App - crabwatch-web

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: crabwatch-web
  RESOURCE_GROUP: VSES-CrabWatch-MY-RG
  NODE_VERSION: "20.x"
  PNPM_VERSION: "10.33.2"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ✅ Checkout
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      # ✅ Setup Node
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      # ✅ CRITICAL FIX: avoid symlink node_modules (pnpm issue)
      - name: Configure pnpm for Azure
        run: pnpm config set node-linker hoisted

      # ✅ Install deps
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ✅ Build packages
      - name: Build shared
        run: pnpm --filter=@crabwatch/shared build

      - name: Build web
        run: pnpm --filter=@crabwatch/web build
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}

      # ✅ CRITICAL FIX: convert symlinks → real files
      - name: Prepare deployment package
        shell: bash
        run: |
          set -euo pipefail

          rm -rf deploy
          mkdir -p deploy

          # Copy standalone with symlink resolution
          rsync -aL web/.next/standalone/ deploy/

          # Add required static + public files
          mkdir -p deploy/web/.next
          cp -R web/.next/static deploy/web/.next/
          cp -R web/public deploy/web/

          # Validate
          test -f deploy/web/server.js || (echo "server.js missing" && exit 1)

          cd deploy
          zip -r ../crabwatch-web.zip .

      # ✅ Azure login (OIDC)
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6EEDB18321F5420A895791EB71E61A89 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_5FDC2254746143CD8DA38D5D4876F309 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CFFB632CA86743B5B96216EA7A84DEE6 }}

      # ✅ Set runtime config
      - name: Configure App Service
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }} \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              ENABLE_ORYX_BUILD=false \
              WEBSITE_NODE_DEFAULT_VERSION=20 \
              WEBSITE_STARTUP_COMMAND="node deploy/web/server.js"

      # ✅ Deploy
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: crabwatch-web.zip

      # ✅ Restart (important for clean load)
      - name: Restart Web App
        run: |
          az webapp restart \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.APP_NAME }}

      # ✅ Health check
      - name: Health Check
        run: |
          for i in {1..12}; do
            if curl -fs https://${{ env.APP_NAME }}.azurewebsites.net; then
              echo "✅ App is live"
              exit 0
            fi
            echo "Waiting... $i"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1