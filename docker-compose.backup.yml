version: '3.8'

services:
  cron:
    image: postgres:15-alpine
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crabwatch}
      DB_USER: ${DB_USER:-postgres}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/backups/backup-db.sh:ro
      - ./scripts/crontab:/etc/cron.d/crontab
    command: ["sh", "-c", "chmod 644 /etc/cron.d/crontab && crontab /etc/cron.d/crontab && cron && tail -f /dev/null"]
