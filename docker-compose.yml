version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: crabwatch-postgres
    restart: unless-stopped
    env_file:
      - docker-compose.env
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-crabwatch}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  backup:
    image: postgres:15-alpine
    container_name: crabwatch-backup
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - docker-compose.env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-crabwatch}
      DB_USER: ${DB_USER:-postgres}
      BACKUP_DIR: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/backups/backup-db.sh:ro
    command: ["sh", "/backups/backup-db.sh"]

volumes:
  postgres_data:
